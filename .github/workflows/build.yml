name: Build All MSBuild Solutions Release x64

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Pull the source code down to the runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Add MSBuild to the command line path
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. Discover and compile every solution file recursively
    - name: Build All Solutions (Release x64)
      run: |
        Get-ChildItem -Recurse -Filter *.sln | ForEach-Object {
            Write-Output "========================================="
            Write-Output "Compiling: $($_.FullName)"
            Write-Output "========================================="
            msbuild $_.FullName /p:Configuration=Release /p:Platform=x64 /m
        }

    # 4. Gather all compiled executables across both projects
    - name: Upload All Compiled Binaries
      uses: actions/upload-artifact@v4
      with:
        name: NtCreateUserProcess-All-Binaries
        path: |
          **/x64/Release/*.exe